version: "3.3"

services:
  test-backend:
    image: ghcr.io/cafeqrlatest/testcafeqrbackend:latest
    container_name: cafeqr-test-backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Memory limits tuned for Oracle VM with 2GB Swap
      - JAVA_TOOL_OPTIONS=-Xmx512m -Xms128m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
      
      # OVERRIDE to point to local database container (using test names)
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/test_pos_db
      - SPRING_DATASOURCE_USERNAME=test_pos_user
      - SPRING_DATASOURCE_PASSWORD=test_pos_password
      
      # OVERRIDE to point to local redis container
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=
      - SPRING_DATA_REDIS_SSL=false
      
      - SPRING_DATASOURCE_HIKARI_MAX_POOL_SIZE=10
      - SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=2
    ports:
      - "80:8080"
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    container_name: cafeqr-test-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:15432:5432"
    environment:
      - POSTGRES_DB=test_pos_db
      - POSTGRES_USER=test_pos_user
      - POSTGRES_PASSWORD=test_pos_password
    volumes:
      - test_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cafeqr-test-redis
    restart: unless-stopped

volumes:
  test_postgres_data:
