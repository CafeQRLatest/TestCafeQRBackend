# ──────────────────────────────────────────────────────────────
# CafeQR 2.0 — Production Docker Compose (Hostinger VPS)
# ──────────────────────────────────────────────────────────────
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down
#
# IMPORTANT: Copy .env.production.example → .env before first run.
# ──────────────────────────────────────────────────────────────

services:

  # ── Reverse Proxy (Caddy — automatic HTTPS via Let's Encrypt) ──
  caddy:
    image: caddy:2-alpine
    container_name: cafeqr-caddy
    restart: unless-stopped
    environment:
      # Defaults to HTTP on any host/IP. Set CADDY_SITE_ADDRESS=your-domain.com
      # in .env after DNS is ready to enable automatic HTTPS.
      - CADDY_SITE_ADDRESS=${CADDY_SITE_ADDRESS:-:80}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"     # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend_net
    deploy:
      resources:
        limits:
          memory: 64M

  # ── Backend (Spring Boot) ──
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/cafeqrllp/cafeqr-backend:latest}
    container_name: cafeqr-backend
    restart: unless-stopped
    env_file: .env
    environment:
      # JVM tuning for 4 GB VPS
      - JAVA_TOOL_OPTIONS=-Xmx512m -Xms256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
      # Internal Docker service addresses
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${DB_NAME:-pos_db}
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-cafeqr_prod}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=
      - SPRING_DATA_REDIS_SSL=false
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USER:-cafeqr}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      - SPRING_RABBITMQ_VHOST=/
      - SPRING_RABBITMQ_SSL=false
    volumes:
      - backend_backups:/app/data/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - frontend_net
      - backend_net
    deploy:
      resources:
        limits:
          memory: 768M

  # ── Frontend (Next.js) ──
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/cafeqrllp/cafeqr-frontend:latest}
    container_name: cafeqr-frontend
    restart: unless-stopped
    env_file: .env.frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000 >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - frontend_net
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Database (PostgreSQL 15) ──
  db:
    image: postgres:15-alpine
    container_name: cafeqr-db
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_DB: ${DB_NAME:-pos_db}
      POSTGRES_USER: ${DB_USER:-cafeqr_prod}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Localhost-only admin access for SSH-tunneled tools such as DBeaver.
      # Do not bind this to 0.0.0.0 in production.
      - "127.0.0.1:15432:5432"
    # Production-tuned PostgreSQL for 4 GB VPS
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=512MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c max_connections=50
        -c wal_buffers=8MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c log_min_duration_statement=1000
        -c log_checkpoints=on
        -c log_connections=on
        -c log_disconnections=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cafeqr_prod} -d ${DB_NAME:-pos_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Cache (Redis 7) ──
  redis:
    image: redis:7-alpine
    container_name: cafeqr-redis
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --save 60 100
        --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          memory: 192M

  # ── Message Queue (RabbitMQ 3) ──
  rabbitmq:
    image: rabbitmq:3-alpine
    container_name: cafeqr-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-cafeqr}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      # Limit Erlang VM memory to prevent OOM on 4 GB VPS
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit vm_memory_high_watermark 0.4"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          memory: 512M

# ── Networks ──
# Two isolated networks ensure the database/cache/queue
# are NEVER reachable from the public internet.
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
    internal: true    # No internet access — internal services only

# ── Volumes ──
volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  rabbitmq_data:
  backend_backups:
