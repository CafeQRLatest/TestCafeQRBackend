server:
  port: 8080
  max-http-request-header-size: 65536

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  main:
    allow-bean-definition-overriding: true
  application:
    name: cafe-qr-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/pos_db}
    username: ${SPRING_DATASOURCE_USERNAME:pos_user}
    password: ${SPRING_DATASOURCE_PASSWORD:pos_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
      idle-timeout: 30000
      max-lifetime: 1800000
      leak-detection-threshold: 2000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    baseline-on-migrate: true
    validate-on-migrate: false
    out-of-order: true
    clean-on-validation-error: false
    repair-on-migrate: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL:false}



  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: 587
    username: uksayoojjayarajan@gmail.com
    password: ynvtzfkcvlhvpmmb
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: ${SMTP_CONNECTION_TIMEOUT:10000}
          timeout: ${SMTP_TIMEOUT:10000}
          writetimeout: ${SMTP_WRITE_TIMEOUT:10000}
          ssl:
            trust: ${SMTP_SSL_TRUST:${SMTP_HOST:smtp.gmail.com}}

email:
  provider: ${EMAIL_PROVIDER:smtp}

gmail:
  api:
    client-id: ${GMAIL_CLIENT_ID:}
    client-secret: ${GMAIL_CLIENT_SECRET:}
    refresh-token: ${GMAIL_REFRESH_TOKEN:}
    sender-email: ${GMAIL_SENDER_EMAIL:testcafeqr@gmail.com}

# JWT Configuration
jwt:
  private-key: ${JWT_PRIVATE_KEY:}
  public-key: ${JWT_PUBLIC_KEY:}
  expiration: 14400000 # 4 hours in ms
  refresh-expiration: 2592000000 # 30 days in ms

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
  health:
    # Disable Redis and RabbitMQ health indicators.
    # The reactive Redis health check runs during startup and throws
    # InterruptedException when Redis DNS hasn't resolved yet, which
    # crashes the entire Spring context. Redis/RabbitMQ connectivity
    # is not critical for the health probe — the app gracefully
    # reconnects on its own.
    redis:
      enabled: false
    rabbit:
      enabled: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  otp:
    log-code: ${OTP_LOG_CODE:false}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}

subscription:
  monthly-amount-paise: ${SUBSCRIPTION_MONTHLY_AMOUNT_PAISE:100}

logging:
  level:
    org.hibernate.orm.jdbc.bind: ERROR # Reduced for production

