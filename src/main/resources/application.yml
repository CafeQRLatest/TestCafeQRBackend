server:
  port: 8080
  max-http-request-header-size: 65536
  tomcat:
    threads:
      max: 30
      min-spare: 5
    connection-timeout: 20000
    max-connections: 1000


spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  main:
    allow-bean-definition-overriding: true
  application:
    name: cafe-qr-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/pos_db}
    username: ${SPRING_DATASOURCE_USERNAME:pos_user}
    password: ${SPRING_DATASOURCE_PASSWORD:pos_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:30000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:10000}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT_MS:3000}
      leak-detection-threshold: ${DB_POOL_LEAK_DETECTION_MS:30000}
      connection-init-sql: "SET statement_timeout = '60s'; SET idle_in_transaction_session_timeout = '60s'"

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
  flyway:
    baseline-on-migrate: true
    validate-on-migrate: false
    out-of-order: true
    clean-on-validation-error: false
    repair-on-migrate: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL:false}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VHOST:/}
    ssl:
      enabled: ${SPRING_RABBITMQ_SSL:false}

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:testcafeqr@gmail.com}
    password: ${SMTP_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: ${SMTP_CONNECTION_TIMEOUT:10000}
          timeout: ${SMTP_TIMEOUT:10000}
          writetimeout: ${SMTP_WRITE_TIMEOUT:10000}
          ssl:
            trust: ${SMTP_SSL_TRUST:${SMTP_HOST:smtp.gmail.com}}

email:
  provider: ${EMAIL_PROVIDER:smtp}

gmail:
  api:
    client-id: ${GMAIL_CLIENT_ID:}
    client-secret: ${GMAIL_CLIENT_SECRET:}
    refresh-token: ${GMAIL_REFRESH_TOKEN:}
    sender-email: ${GMAIL_SENDER_EMAIL:${SMTP_USERNAME:testcafeqr@gmail.com}}

# JWT Configuration
jwt:
  private-key: |-
    
  public-key: |-
    
  expiration: 14400000 # 4 hours in ms
  refresh-expiration: 2592000000 # 30 days in ms

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,https://cafe-test-qr-frontend.vercel.app,https://cafe-qr-frontend.vercel.app,https://test-cafe-qr-delivery-app.vercel.app,https://cafe-qr-delivery-app.vercel.app,https://test-cafe-qr-delivery-website.vercel.app,https://cafe-qr-delivery-website.vercel.app,https://cafeqr-delivery-website.vercel.app,https://cafeqr-frontend.pages.dev,https://*.pages.dev}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  otp:
    log-code: ${OTP_LOG_CODE:false}
  backup:
    storage-dir: ${CAFEQR_BACKUP_STORAGE_DIR:./data/backups}
    restore-token-minutes: ${CAFEQR_BACKUP_RESTORE_TOKEN_MINUTES:30}
