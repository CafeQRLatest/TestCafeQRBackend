# ──────────────────────────────────────────────────────────────
# CafeQR 2.0 Backend — Build & Deploy to Hostinger VPS
# ──────────────────────────────────────────────────────────────
# Triggers on push to main. Builds the Docker image using the
# multi-stage Dockerfile, pushes to GitHub Container Registry,
# then SSHes into the VPS to pull and restart.
# ──────────────────────────────────────────────────────────────
name: Deploy Backend

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'scripts/**'
      - '.gitignore'

  workflow_dispatch:     # Allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ── Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Docker Login ──
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build Metadata ──
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Setup BuildX (required for GHA cache) ──
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build & Push ──
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deploy to VPS ──
      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/cafeqr/app
            git pull
            docker compose -f docker-compose.prod.yml pull backend
            docker compose -f docker-compose.prod.yml up -d --no-deps backend
            
            # Wait for health check
            echo "Waiting for backend to become healthy..."
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' cafeqr-backend 2>/dev/null || echo "starting")
              if [ "$STATUS" = "healthy" ]; then
                echo "✅ Backend is healthy!"
                exit 0
              fi
              echo "  Attempt $i/30: $STATUS"
              sleep 5
            done
            echo "⚠️ Backend did not become healthy in 150 seconds. Check logs."
            docker logs --tail=50 cafeqr-backend
            exit 1
