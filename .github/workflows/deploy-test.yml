name: Deploy Test Backend

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cafeqrlatest/testcafeqrbackend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Oracle Cloud VM
        uses: appleboy/ssh-action@v1
        with:
          host: 140.245.222.224
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          timeout: 120s
          command_timeout: 15m
          script: |
            set -euo pipefail
            
            # Log in to GHCR on the Oracle server to pull the package
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull the new backend image
            sudo docker-compose pull test-backend
            
            # Restart only the backend service, leaving the database and redis untouched
            sudo docker-compose up -d test-backend
            
            # Clean up old unused images to save disk space
            sudo docker image prune -f
