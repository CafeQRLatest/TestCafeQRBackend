services:
  # Backend Service
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${DB_NAME:-pos_db}
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-pos_user}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-pos_password}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY:-}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY:-}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET:-}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-gmail-api}
      - GMAIL_SENDER_EMAIL=${GMAIL_SENDER_EMAIL:-cafeqrllp@gmail.com}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID:-}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET:-}
      - GMAIL_REFRESH_TOKEN=${GMAIL_REFRESH_TOKEN:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - FRONTEND_URL=${FRONTEND_URL:-https://cafeqr-frontend.pages.dev}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL:-}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY:-}
    depends_on:
      - db
      - redis
      - rabbitmq

  # Database Service
  db:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=${DB_NAME:-pos_db}
      - POSTGRES_USER=${DB_USER:-pos_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-pos_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis Service
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # RabbitMQ Service
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data:
